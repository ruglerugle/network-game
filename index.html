<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パケット大冒険 - ネットワークの仕組みを学ぶゲーム</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <header id="hud">
    <div class="hud-left">
      <div class="brand-title">📦 パケット大冒険</div>
      <div class="brand-sub">ネットワークと通信のしくみクエスト</div>
    </div>
    <div class="hud-right">
      <button id="nav-toggle-btn" type="button" class="head-btn">☰ ナビ</button>
      <button id="back-btn" type="button" class="head-btn" disabled>← 前のページ</button>
      <span id="stage-indicator" class="stage-pill">ステージ 0 / 6</span>
      <div class="score-box">
        <div class="score-label">スコア</div>
        <div class="score-val">⭐ <span id="score-indicator">0</span> pt</div>
      </div>
    </div>
  </header>

  <div class="game-layout" id="game-layout">
    <aside class="side-panel" id="side-panel">
      <div class="side-head">
        <button class="side-toggle" id="side-toggle-btn" type="button">☰</button>
        <span class="side-head-text">ステージ一覧</span>
      </div>
      <div class="step-list" id="step-list"></div>
    </aside>

    <main id="game-area">
      <!-- ステージ内容はJSで動的に描画 -->
    </main>
  </div>

  <div id="explain-modal" class="modal hidden">
    <div class="modal-box">
      <h2 id="explain-title"></h2>
      <div id="explain-body"></div>
      <button id="explain-next-btn" type="button" class="btn primary">次へ進む</button>
    </div>
  </div>

  <div id="start-modal" class="modal">
    <div class="modal-box">
      <h1>📦 パケット大冒険</h1>
      <p class="lead">あなたは1つの「データパケット」になって、クライアントからサーバーまでインターネットの旅をします。</p>
      <p>DNS・ルーティング・TCP・ポート番号・パケットロス・ファイアウォール ―― 実際の通信で使われる仕組みを、6つのステージで体験しながら学びましょう。</p>
      <button id="start-btn" type="button" class="btn primary">冒険をはじめる</button>
    </div>
  </div>

  <div id="end-modal" class="modal hidden">
    <div class="modal-box">
      <h1>🎉 クリア！</h1>
      <p class="lead">すべてのステージを完了しました。</p>
      <p id="end-score"></p>
      <div id="end-summary"></div>
      <button id="restart-btn" type="button" class="btn primary">もう一度遊ぶ</button>
    </div>
  </div>

</div>
<script src="script.js"></script>
</body>
</html>
