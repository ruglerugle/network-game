<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パケット大冒険 - ネットワークの仕組みを学ぶゲーム</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <header id="hud">
    <div class="hud-left">
      <span class="logo">📦 パケット大冒険</span>
    </div>
    <div class="hud-right">
      <span id="stage-indicator">ステージ 0 / 6</span>
      <span id="score-indicator">スコア: 0</span>
    </div>
  </header>

  <div id="progress-bar"><div id="progress-fill"></div></div>

  <main id="game-area">
    <!-- ステージ内容はJSで動的に描画 -->
  </main>

  <div id="explain-modal" class="modal hidden">
    <div class="modal-box">
      <h2 id="explain-title"></h2>
      <div id="explain-body"></div>
      <button id="explain-next-btn" type="button" class="btn primary">次へ進む</button>
    </div>
  </div>

  <div id="start-modal" class="modal">
    <div class="modal-box">
      <h1>📦 パケット大冒険</h1>
      <p class="lead">あなたは1つの「データパケット」になって、クライアントからサーバーまでインターネットの旅をします。</p>
      <p>DNS・ルーティング・TCP・ポート番号・パケットロス・ファイアウォール ―― 実際の通信で使われる仕組みを、6つのステージで体験しながら学びましょう。</p>
      <button id="start-btn" type="button" class="btn primary">冒険をはじめる</button>
    </div>
  </div>

  <div id="end-modal" class="modal hidden">
    <div class="modal-box">
      <h1>🎉 クリア！</h1>
      <p class="lead">すべてのステージを完了しました。</p>
      <p id="end-score"></p>
      <div id="end-summary"></div>
      <button id="restart-btn" type="button" class="btn primary">もう一度遊ぶ</button>
    </div>
  </div>

</div>
<script src="script.js"></script>
</body>
</html>
